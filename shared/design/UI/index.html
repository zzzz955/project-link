<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Project Link — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f6f3ea;
    --ink:#1d1d1d;
    --ink-soft:#5a5a5a;
    --grid:#0000000d;
    --accent:#7B2FBE;
    --accent2:#E040FB;
    --pos:#00b56e;
    --warn:#e08a00;
    --danger:#d63838;
    --link:#1a5ad9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Patrick Hand", "Comic Sans MS", system-ui, sans-serif;font-size:17px;line-height:1.35}
  body{
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 24px 24px;
    min-height:100vh;
  }
  header{
    padding:18px 24px 8px;
    border-bottom:2px dashed #00000022;
    background:var(--paper);
    position:sticky; top:0; z-index:10;
  }
  h1{font-family:"Caveat", cursive; font-weight:700; font-size:36px; margin:0 0 4px}
  .sub{color:var(--ink-soft); font-size:18px; margin:0}
  .files{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; font-family:"JetBrains Mono", monospace; font-size:13px}
  .files a{
    text-decoration:none; color:var(--link);
    border:1.5px solid var(--link); border-radius:6px;
    padding:3px 8px; background:#fff;
  }
  .files a:hover{background:#eef3ff}
  .layout{display:grid; grid-template-columns: 220px 1fr; gap:16px; padding:16px 24px 60px}
  nav.scene-nav{
    background:#fff;
    border:2px solid var(--ink);
    border-radius:14px;
    padding:12px;
    position:sticky; top:128px;
    height:fit-content;
    box-shadow:3px 3px 0 #00000022;
  }
  nav h2{font-family:"Caveat", cursive; font-size:22px; margin:6px 4px}
  nav button{
    display:block; width:100%;
    text-align:left;
    background:transparent; border:none;
    font:inherit; color:var(--ink);
    padding:6px 8px; border-radius:6px;
    cursor:pointer;
  }
  nav button:hover{background:#0000000a}
  nav button.active{background:var(--ink); color:var(--paper)}
  nav .sect{font-family:"Caveat", cursive; font-size:18px; color:var(--ink-soft); margin:10px 4px 2px; border-top:1.5px dashed #00000022; padding-top:8px}
  main{display:grid; grid-template-columns: 380px 1fr; gap:24px}

  /* phone frame */
  .phone{
    width:380px; height:760px;
    background:#16213E;
    border:3px solid var(--ink);
    border-radius:38px;
    box-shadow:6px 6px 0 #00000022;
    position:relative;
    overflow:hidden;
    color:#fff;
    font-family:"Patrick Hand", sans-serif;
  }
  .phone .notch{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:120px; height:22px; background:#000; border-radius:0 0 12px 12px; z-index:5;
  }
  .phone .statusbar{position:absolute; top:0; left:0; right:0; height:28px; padding:4px 22px; display:flex; justify-content:space-between; font-size:12px; font-family:"JetBrains Mono", monospace; color:#fff; opacity:.7; z-index:4}
  .phone .screen{position:absolute; inset:28px 0 0 0; overflow:hidden}

  /* sketch shapes */
  .sk{ border:2.5px solid var(--ink); border-radius:14px; background:#ffffff14; padding:8px; position:absolute; }
  .sk--white{background:#ffffff14}
  .sk--dark{background:#00000033}
  .sk--label{color:#fff; font-size:14px; opacity:.95}
  .sk--mono{font-family:"JetBrains Mono", monospace; font-size:12px}
  .sk-pill{border-radius:999px}
  .sk-accent{border-color:#fff; background:linear-gradient(135deg,#7B2FBE,#E040FB); color:#fff}
  .sk-accent .sk--label{color:#fff;font-weight:700}
  .sk-outline{background:transparent}
  .sk-danger{background:#FF525233; border-color:#FF5252}
  .sk-circ{border-radius:50%}
  .sk-center{display:flex; align-items:center; justify-content:center; text-align:center}
  .sk-row{display:flex; align-items:center; gap:6px}
  .sk-col{display:flex; flex-direction:column; gap:6px}
  .sk-tag{
    position:absolute; right:-6px; top:-10px;
    background:var(--paper); color:var(--ink);
    border:1.5px solid var(--ink); border-radius:6px;
    padding:1px 5px; font-family:"JetBrains Mono", monospace; font-size:10px;
    transform:rotate(-2deg);
  }
  .annot{
    position:absolute; color:#ffe082; font-family:"Caveat",cursive; font-size:14px;
    pointer-events:none;
  }
  .annot::before{content:"↳ "; opacity:.7}

  /* hatched placeholder */
  .hatch{
    background-image:repeating-linear-gradient(45deg,#ffffff22 0 6px,transparent 6px 12px);
  }

  /* spec panel */
  .spec{
    background:#fff;
    border:2px solid var(--ink);
    border-radius:14px;
    padding:14px 18px;
    font-family:"JetBrains Mono", monospace;
    font-size:13px;
    line-height:1.55;
    box-shadow:3px 3px 0 #00000022;
    height:fit-content;
  }
  .spec h3{font-family:"Caveat", cursive; font-weight:700; font-size:26px; margin:0 0 6px; color:var(--ink)}
  .spec .sub{font-family:"Patrick Hand"; font-size:17px; color:var(--ink-soft); margin:0 0 12px}
  .spec table{border-collapse:collapse; width:100%; margin:6px 0 14px}
  .spec th{
    text-align:left; padding:4px 8px;
    background:#f1eee5; border:1px solid #d8d3c4;
    font-weight:600; font-size:12px;
  }
  .spec td{padding:4px 8px; border:1px solid #e5e1d4; vertical-align:top; font-size:12px}
  .spec td.k{color:#7B2FBE; white-space:nowrap}
  .spec td.s{color:#00754f; white-space:nowrap}
  .spec td.e{color:#d63838; white-space:nowrap}
  .spec details{margin-top:8px; border-top:1px dashed #00000022; padding-top:8px}
  .spec summary{cursor:pointer; font-family:"Caveat",cursive; font-size:18px}
  .spec pre{background:#f7f5ed; border:1px solid #e0dccd; padding:10px; border-radius:8px; overflow:auto; max-height:340px; font-size:11.5px; line-height:1.45}
  .pillinfo{display:inline-block; border:1.5px solid var(--ink); border-radius:999px; padding:1px 8px; font-size:11px; font-family:"JetBrains Mono",monospace; margin-right:4px; margin-bottom:2px; background:#fff}
  .pillinfo.warn{border-color:var(--warn); color:var(--warn)}
  .pillinfo.danger{border-color:var(--danger); color:var(--danger)}
  .pillinfo.pos{border-color:var(--pos); color:var(--pos)}

  .page{display:none}
  .page.active{display:block}

  @media (max-width: 1100px){
    main{grid-template-columns: 1fr}
    .phone{margin: 0 auto}
  }
</style>
</head>
<body>

<header>
  <h1>Project Link — Wireframes &amp; UI Spec</h1>
  <p class="sub">Hyper-casual puzzle · portrait mobile · Unity6 + UIButtonSkin · machine-readable hierarchy in <code>unity-spec/</code></p>
  <div class="files">
    <a href="unity-spec/README.md">README.md</a>
    <a href="unity-spec/scenes.json">scenes.json</a>
    <a href="unity-spec/popups.json">popups.json</a>
    <a href="unity-spec/flow.json">flow.json</a>
    <a href="unity-spec/strings.json">strings.json</a>
    <a href="unity-spec/skin-keys.json">skin-keys.json</a>
  </div>
</header>

<div class="layout">
  <nav class="scene-nav" id="nav">
    <h2>Scenes</h2>
    <button data-page="bootstrap" class="active">Bootstrap</button>
    <button data-page="title">Title</button>
    <button data-page="lobby-home">Lobby / Home</button>
    <button data-page="lobby-shop">Lobby / Shop</button>
    <button data-page="lobby-rank">Lobby / Ranking</button>
    <button data-page="game">Game</button>
    <div class="sect">Popups · Global</div>
    <button data-page="p-force">ForceUpdate</button>
    <button data-page="p-maint">Maintenance</button>
    <button data-page="p-session">SessionExpired</button>
    <button data-page="p-setting">Settings</button>
    <button data-page="p-energy">Energy</button>
    <button data-page="p-stage">StageDetail</button>
    <button data-page="p-daily">DailyChallenge</button>
    <button data-page="p-reward">Reward</button>
    <button data-page="p-account">Account</button>
    <div class="sect">Popups · Game</div>
    <button data-page="p-clear">Clear</button>
    <button data-page="p-pause">Pause</button>
    <button data-page="p-timeout">Timeout</button>
    <div class="sect">System</div>
    <button data-page="p-toast">Toast</button>
    <button data-page="flow">Flow / Nav</button>
  </nav>

  <section id="pages">
    <!-- pages injected by script -->
  </section>
</div>

<script>
// Helpers to keep sketches concise
const Phone = (inner, opts={}) => `

// Pre-built sketches per scene

  'lobby-home': Phone(`

    <div class="sk sk-row" style="left:18px;right:18px;top:520px;height:60px;background:#16213E;padding:8px 12px">

                          [],

  'p-clear':  popupSketch('STAGE CLEAR!','popup.clear.title', null,

  'p-toast': Phone(`
    <div style="position:absolute;left:14px;right:14px;top:14px;display:flex;flex-direction:column;gap:6px">

function popupSketch(title, titleKey, body, footer, opts={}){
  const stars = opts.stars ? `<div class="sk-row" style="justify-content:center;gap:8px;font-size:24px;color:#FFB300">${'★'.repeat(opts.stars)}${'☆'.repeat(3-opts.stars)}</div>` : '';
  const hearts = opts.hearts ? `<div class="sk-row" style="justify-content:center;gap:4px;font-size:22px;color:#FF5252">${'♥'.repeat(opts.heartsFilled)}<span style="color:#ffffff33">${'♥'.repeat(opts.hearts-opts.heartsFilled)}</span><span style="font-family:'JetBrains Mono';font-size:14px;color:#fff;margin-left:6px">${opts.heartsFilled}/${opts.hearts}</span></div>` : '';
  const spine = opts.spineBox ? `<div class="hatch sk-center" style="height:90px;border:1.5px dashed #fff;color:#fff;font-size:13px;border-radius:10px">[SPINE]</div>` : '';
  const avatar = opts.avatarBox ? `<div class="sk-circ" style="width:64px;height:64px;background:#fff;opacity:.5;margin:0 auto;border:1.5px solid #fff"></div><div style="text-align:center;font-size:14px;margin-top:4px">Username</div><div style="text-align:center;font-size:12px;opacity:.6">${opts.joined}</div>` : '';
  const providers = opts.providers ? `<div style="margin-top:8px;font-size:12px;opacity:.7">Linked Accounts</div>${opts.providers.map(([k,state])=>`<div class="sk-row" style="margin-top:4px;background:#ffffff14;padding:4px 8px;border:1.5px solid #ffffff66;border-radius:8px"><div class="sk-circ" style="width:18px;height:18px;background:#fff;opacity:.6"></div><div style="flex:1;padding-left:8px;font-size:13px">Provider ${k||'B'}</div><div style="font-size:12px;color:${state==='Linked'?'#76FF03':'#fff'}">${state}</div></div>`).join('')}` : '';
  const rows = opts.rows ? opts.rows.map(([label,kind])=>`<div class="sk-row" style="margin-top:6px;padding:0 4px"><div style="flex:1;font-size:13px">${label}</div>${kind==='toggle'?'<div class="sk-pill" style="width:38px;height:20px;background:#7B2FBE;border:1.5px solid #fff;position:relative"><div class="sk-circ" style="width:14px;height:14px;background:#fff;position:absolute;right:2px;top:1px"></div></div>':'<div class="sk--mono" style="font-size:12px;border:1.5px solid #fff;border-radius:6px;padding:1px 8px">English ▼</div>'}</div>`).join('') : '';
  const streak = opts.streakRow ? `<div style="text-align:center;color:#FFB300;font-weight:700">Streak: 5 🔥</div><div class="sk-row" style="justify-content:center;gap:4px;margin-top:6px">${[1,1,1,1,0,0,0].map(d=>`<div class="sk-circ" style="width:22px;height:22px;background:${d?'#7B2FBE':'#ffffff22'};border:1.5px solid #fff"></div>`).join('')}</div>` : '';
  const progress = opts.progress ? `<div style="margin-top:8px;height:10px;background:#ffffff22;border-radius:5px;overflow:hidden"><div style="width:${opts.progress*100}%;height:100%;background:linear-gradient(90deg,#7B2FBE,#E040FB)"></div></div>` : '';
  const currency = opts.currency ? `<div style="text-align:center;font-family:'JetBrains Mono';font-size:24px;color:#fff;margin-top:4px">${opts.currency}</div>` : '';
  const sub = opts.sub ? `<div style="text-align:center;font-size:13px;opacity:.85;margin-top:4px">${opts.sub}</div>` : '';
  const newRecord = opts.accent ? '' : '';
  const icon = opts.icon ? `<div style="text-align:center;font-size:42px;color:${opts.iconColor||'#fff'};margin-bottom:4px">${opts.icon}</div>` : '';
  const bodyHTML = body ? `<div style="text-align:center;font-size:14px;opacity:.85;line-height:1.4;margin-top:4px">${body}</div>` : '';

  const closeBtn = opts.dismissible ? `<div class="sk-circ sk-center" style="position:absolute;right:10px;top:10px;width:24px;height:24px;background:#ffffff22;border:1.5px solid #fff;font-size:13px">×</div>` : '';
  const footerDir = opts.footerVertical ? 'column' : 'row';
  const footerHTML = footer.length ? `<div style="display:flex;flex-direction:${footerDir};gap:8px;margin-top:14px">${footer.map(([label,kind])=>{
    const cls = kind==='primary' ? 'sk sk-pill sk-accent sk-center' : kind==='positive' ? 'sk sk-pill sk-center' : 'sk sk-pill sk-outline sk-center';
    const extra = kind==='positive' ? 'background:#00E5FF;color:#1A1A2E;border-color:#00E5FF;' : '';
    return `<div class="${cls}" style="position:relative;flex:1;height:34px;${extra}font-size:13px">${label}</div>`;
  }).join('')}</div>` : '';

  return Phone(`
    <div style="position:absolute;inset:0;background:#000000B3"></div>
    <div style="position:absolute;left:18px;right:18px;top:50%;transform:translateY(-50%);background:#16213E;border:2px solid #1d1d1d;border-radius:18px;padding:18px 16px;color:#fff;box-shadow:4px 4px 0 #00000055;">
      ${closeBtn}
      <div style="text-align:center;font-family:'Caveat',cursive;font-size:24px;color:#fff;font-weight:700">${title}</div>
      <div style="height:1.5px;background:#ffffff22;margin:8px 0"></div>
      ${icon}
      ${spine}
      ${avatar}
      ${hearts}
      ${stars}
      ${streak}
      ${rows}
      ${currency}
      ${progress}
      ${providers}
      ${sub}
      ${bodyHTML}
      ${footer.length?'<div style="height:1.5px;background:#ffffff22;margin-top:12px"></div>':''}
      ${footerHTML}
      <div class="sk-tag" style="right:8px;top:-12px;background:#f6f3ea">${titleKey}</div>
    </div>
  `);
}

function popupSpec(id, attrs, footer, content){

function specHTML(s){
  const rows = (s.elements||[]).map(([n,sk,k,e])=>`<tr>
      <td>${n}</td>
      <td class="k">${sk}</td>
      <td class="s">${k}</td>
      <td class="e">${e}</td>
    </tr>`).join('');
  const states = s.states ? `<div style="margin-top:8px">${s.states.map(x=>`<span class="pillinfo">${x}</span>`).join('')}</div>` : '';
  const extra = s.extra ? `<div style="margin-top:8px;color:#5a5a5a">${s.extra}</div>` : '';
  return `<div class="spec">
    <h3>${s.title}</h3>
    <div class="sub">${s.sub||''}</div>
    <table>
      <thead><tr><th>Element</th><th>skinKey</th><th>stringKey / bind</th><th>event / note</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${states}${extra}
  </div>`;
}

// build pages
const pagesEl = document.getElementById('pages');
Object.keys(sketches).forEach((id,i)=>{
  const div = document.createElement('div');
  div.className = 'page' + (i===0?' active':'');
  div.id = 'page-'+id;
  div.innerHTML = `<main>${sketches[id]}${specHTML(specs[id]||{title:id,sub:'',elements:[]})}</main>`;
  pagesEl.appendChild(div);
});

// nav
document.querySelectorAll('#nav button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('page-'+b.dataset.page).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  });
});
