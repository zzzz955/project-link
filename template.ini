; =============================================================
; Game Development Template — Configuration
; Secrets (passwords, tokens, hosts) → .env.dev / .env.prod
; Non-secret settings → here (committed to git)
; Priority: .env variables > this file > hardcoded defaults
; =============================================================

[paths]
; datas_dir: CSV 원본 데이터 루트
datas_dir        = shared/datas/
; packets_dir: 패킷/계약 원본 루트
packets_dir      = shared/packets/
; db_schema: DB 스키마 JSON 경로
db_schema        = server/db/schema.json
; client_generated: 클라이언트 리소스 생성물 출력 경로
client_generated         = client/project-link/Assets/Resources/
; client_scripts_generated: 클라이언트 C# 데이터 스크립트 출력 경로
client_scripts_generated = client/project-link/Assets/Scripts/Data/Generated/
; server_generated: 서버 생성물 출력 경로
server_generated         = server/generated/
; server_scripts_generated: 서버 스크립트 생성물 출력 경로
server_scripts_generated = server/generated/scripts/
; migrations_dir: ORM 마이그레이션 SQL 출력 경로
migrations_dir   = server/db/migrations/
; proto_generated: protobuf 생성물 출력 경로
proto_generated  = generated/proto/

[data-gen]
; Which target codes to include: C=client-only, S=server-only, CS=both
; client_targets: 클라이언트에 포함할 데이터 대상 코드 목록
client_targets = CS,C
; server_targets: 서버에 포함할 데이터 대상 코드 목록
server_targets = CS,S
; Namespace for generated C# data model classes
; client_namespace: 클라이언트 생성 C# 데이터 클래스 네임스페이스
client_namespace = ProjectLink.Data.Generated
; server_namespace: 서버 생성 C# 데이터 클래스 네임스페이스
server_namespace = ProjectLink.Generated.Data

[packet-gen]
; mode: 패킷 생성 방식
; mode: protobuf → .proto (intermediate, run protoc separately)
;       rest     → DTO classes directly to client/server generated/
mode = protobuf
; client_language / server_language only apply in rest mode
; Supported: csharp, cpp
; client_language: rest 모드에서 클라이언트 코드 생성 언어
client_language = csharp
; server_language: rest 모드에서 서버 코드 생성 언어
server_language = csharp
; Namespace for generated C# code (rest mode only)
; client_namespace: rest 모드 클라이언트 생성 코드 네임스페이스
client_namespace = Generated.Packets
; server_namespace: rest 모드 서버 생성 코드 네임스페이스
server_namespace = Generated.Packets

[orm-gen]
; dry_run: true면 SQL 파일만 생성하고 false면 DB에도 즉시 반영
; dry_run=true  → generate SQL migration file only, do NOT execute
; dry_run=false → generate SQL migration file AND execute on DB
dry_run = false

[stage-editor]
; Default field values applied when the Add button is clicked
; default_width: 새 스테이지 기본 너비
default_width      = 8
; default_height: 새 스테이지 기본 높이
default_height     = 8
; default_time: 새 스테이지 기본 제한 시간(초)
default_time       = 60
; default_difficulty: 새 스테이지 기본 난이도
default_difficulty = 1

; =============================================================
; Type mappings: CSV normalized type → target language type
; Add new [type-map.yourlang] sections for additional targets
; =============================================================

[type-map.proto]
int8   = int32
int16  = int32
int32  = int32
int64  = int64
uint8  = uint32
uint16 = uint32
uint32 = uint32
uint64 = uint64
float  = float
double = double
bool   = bool
string = string

[type-map.csharp]
int8   = sbyte
int16  = short
int32  = int
int64  = long
uint8  = byte
uint16 = ushort
uint32 = uint
uint64 = ulong
float  = float
double = double
bool   = bool
string = string

[type-map.cpp]
int8   = int8_t
int16  = int16_t
int32  = int32_t
int64  = int64_t
uint8  = uint8_t
uint16 = uint16_t
uint32 = uint32_t
uint64 = uint64_t
float  = float
double = double
bool   = bool
string = std::string
