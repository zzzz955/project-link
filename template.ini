; =============================================================
; Game Development Template — Configuration
; Secrets (passwords, tokens, hosts) → .env
; Non-secret settings → here (committed to git)
; Priority: .env variables > this file > hardcoded defaults
; =============================================================

[paths]
datas_dir        = shared/datas/
packets_dir      = shared/packets/
db_schema        = server/db/schema.json
client_generated = client/src/generated/
server_generated = server/src/generated/
migrations_dir   = server/db/migrations/
proto_generated  = generated/proto/

[data-gen]
; Which target codes to include: C=client-only, S=server-only, CS=both
client_targets = CS,C
server_targets = CS,S

[packet-gen]
; mode: protobuf → .proto (intermediate, run protoc separately)
;       rest     → DTO classes directly to client/server generated/
mode = protobuf
; client_language / server_language only apply in rest mode
; Supported: csharp, cpp
client_language = csharp
server_language = csharp
; Namespace for generated C# code (rest mode only)
client_namespace = Generated.Packets
server_namespace = Generated.Packets

[orm-gen]
; dry_run=true  → generate SQL migration file only, do NOT execute
; dry_run=false → generate SQL migration file AND execute on DB
dry_run = true

; =============================================================
; Type mappings: CSV normalized type → target language type
; Add new [type-map.yourlang] sections for additional targets
; =============================================================

[type-map.proto]
int8   = int32
int16  = int32
int32  = int32
int64  = int64
uint8  = uint32
uint16 = uint32
uint32 = uint32
uint64 = uint64
float  = float
double = double
bool   = bool
string = string

[type-map.csharp]
int8   = sbyte
int16  = short
int32  = int
int64  = long
uint8  = byte
uint16 = ushort
uint32 = uint
uint64 = ulong
float  = float
double = double
bool   = bool
string = string

[type-map.cpp]
int8   = int8_t
int16  = int16_t
int32  = int32_t
int64  = int64_t
uint8  = uint8_t
uint16 = uint16_t
uint32 = uint32_t
uint64 = uint64_t
float  = float
double = double
bool   = bool
string = std::string
