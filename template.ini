[paths]
datas_dir = shared/datas/
packets_dir = shared/packets/
db_schema = server/db/schema.json
client_generated = client/project-link/Assets/Resources/
client_scripts_generated = client/project-link/Assets/Scripts/Data/Generated/
server_generated = server/generated/
server_scripts_generated = server/generated/scripts/
migrations_dir = server/db/migrations/
proto_generated = generated/proto/

[data-gen]
client_targets = CS,C
server_targets = CS,S
client_namespace = ProjectLink.Data.Generated
server_namespace = ProjectLink.Generated.Data

[packet-gen]
mode = protobuf
client_language = csharp
server_language = csharp
client_namespace = Generated.Packets
server_namespace = Generated.Packets

[orm-gen]
dry_run = false

[stage-editor]
default_width = 8
default_height = 8
default_time = 60
default_difficulty = 1

[type-map.proto]
int8 = int32
int16 = int32
int32 = int32
int64 = int64
uint8 = uint32
uint16 = uint32
uint32 = uint32
uint64 = uint64
float = float
double = double
bool = bool
string = string

[type-map.csharp]
int8 = sbyte
int16 = short
int32 = int
int64 = long
uint8 = byte
uint16 = ushort
uint32 = uint
uint64 = ulong
float = float
double = double
bool = bool
string = string

[type-map.cpp]
int8 = int8_t
int16 = int16_t
int32 = int32_t
int64 = int64_t
uint8 = uint8_t
uint16 = uint16_t
uint32 = uint32_t
uint64 = uint64_t
float = float
double = double
bool = bool
string = std::string
